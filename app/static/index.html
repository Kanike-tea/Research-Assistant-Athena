<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered research assistant dashboard — parallel analysis with streaming results." />

  <title>Research Assistant — Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Marked.js — Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js" defer></script>

  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <div class="app-layout">
    <!-- ── Sidebar (History) ───────────────────────────────── -->
    <aside class="sidebar">
      <div class="history-panel">
        <div class="history-header">
          <span>Recent Searches</span>
          <button id="clear-history">Clear</button>
        </div>
        <ul id="history-list"></ul>
      </div>
    </aside>

    <!-- ── Main Dashboard ────────────────────────────────── -->
    <main class="dashboard">

      <!-- ── Header ────────────────────────────────────────── -->
    <header class="dash-header">
      <div class="dash-logo" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 18h8"/><path d="M3 22h18"/>
          <path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/>
          <path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/>
          <path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/>
        </svg>
      </div>
      <div class="dash-title-group">
        <div class="dash-title">Research Assistant</div>
        <div class="dash-version">v2.0 · LangChain Parallel Pipeline · llama3.2:1b</div>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme">
        <!-- Moon icon for light mode -->
        <svg class="icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <!-- Sun icon for dark mode -->
        <svg class="icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
      <div class="dash-status" id="dash-status">
        <span class="status-dot ready" id="status-dot"></span>
        <span id="status-text">READY</span>
      </div>
    </header>

    <!-- ── Search ────────────────────────────────────────── -->
    <form id="search-form" class="search-bar" role="search">
      <div class="search-input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="topic-input" class="search-input"
               placeholder="Enter research topic…" autocomplete="off" required />
      </div>
      <button type="submit" id="btn-execute" class="btn-execute">
        <span class="exec-spinner" aria-hidden="true"></span>
        <svg class="exec-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="6 3 20 12 6 21 6 3"/>
        </svg>
        EXECUTE
      </button>
    </form>

    <!-- ── Progress ──────────────────────────────────────── -->
    <div id="progress-bar" class="progress-bar">
      <span class="progress-label" id="progress-label">0 / 4 tasks</span>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- ── Error ─────────────────────────────────────────── -->
    <div id="error-banner" class="error-banner" role="alert">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/>
        <line x1="12" x2="12.01" y1="16" y2="16"/>
      </svg>
      <span id="error-message">An error occurred.</span>
    </div>

    <!-- ── Dashboard Grid ────────────────────────────────── -->
    <div class="dash-grid">

      <!-- CATEGORY -->
      <section class="panel panel--category" data-channel="category" data-state="skeleton" id="panel-category">
        <div class="panel-head">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          </svg>
          <span class="panel-label">Category</span>
          <span class="panel-status" id="status-category"></span>
        </div>
        <div class="panel-body" id="body-category">
          <div class="skel skel-badge"></div>
        </div>
      </section>

      <!-- SUMMARY -->
      <section class="panel panel--summary" data-channel="summary" data-state="skeleton" id="panel-summary">
        <div class="panel-head">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/>
            <line x1="10" x2="8" y1="9" y2="9"/>
          </svg>
          <span class="panel-label">Executive Summary</span>
          <span class="panel-status" id="status-summary"></span>
        </div>
        <div class="panel-body" id="body-summary">
          <div class="skel skel-line"></div>
          <div class="skel skel-line"></div>
          <div class="skel skel-line"></div>
        </div>
      </section>

      <!-- KEYWORDS -->
      <section class="panel panel--keywords" data-channel="keywords" data-state="skeleton" id="panel-keywords">
        <div class="panel-head">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 2 7l10 5 10-5-10-5Z"/>
            <path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/>
          </svg>
          <span class="panel-label">Keyword Cloud</span>
          <span class="panel-status" id="status-keywords"></span>
        </div>
        <div class="panel-body" id="body-keywords">
          <span class="skel skel-pill"></span>
          <span class="skel skel-pill"></span>
          <span class="skel skel-pill"></span>
          <span class="skel skel-pill"></span>
          <span class="skel skel-pill"></span>
          <span class="skel skel-pill"></span>
        </div>
      </section>

      <!-- EXPLANATION -->
      <section class="panel panel--explanation" data-channel="explanation" data-state="skeleton" id="panel-explanation">
        <div class="panel-head">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
          <span class="panel-label">Detailed Explanation</span>
          <span class="panel-status" id="status-explanation"></span>
        </div>
        <div class="panel-body" id="body-explanation">
          <div class="skel skel-line"></div>
          <div class="skel skel-line"></div>
          <div class="skel skel-line"></div>
          <div class="skel skel-line"></div>
          <div class="skel skel-line"></div>
          <div class="skel skel-line"></div>
        </div>
      </section>

    </div>
    <div class="execution-time" id="execution-time">
    Execution Time: --
    </div>
    <div class="download-section">
    <button id="download-txt" class="download-btn">
        Download Report (TXT)
    </button>
    </div>

    <!-- ── Footer ────────────────────────────────────────── -->
    <footer class="dash-footer">
      Powered by Local AI (Ollama)
      &middot; <a href="https://www.langchain.com/" target="_blank" rel="noopener noreferrer">LangChain</a>
      &middot; <a href="/docs" target="_blank" rel="noopener noreferrer">API Docs</a>
    </footer>

    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
