<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered research assistant that generates detailed explanations, summaries, keywords, and topic classification in parallel." />

  <title>Research Assistant</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />

  <!-- Marked.js – Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js" defer></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-gradient" aria-hidden="true"></div>

  <div class="app-container">

    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="app-header">
      <div class="app-logo" aria-hidden="true">
        <!-- Microscope icon (inline SVG) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 18h8"/>
          <path d="M3 22h18"/>
          <path d="M14 22a7 7 0 1 0 0-14h-1"/>
          <path d="M9 14h2"/>
          <path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/>
          <path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/>
        </svg>
      </div>
      <h1 class="app-title">Research Assistant</h1>
      <p class="app-subtitle">Enter any topic and get an AI-powered deep dive — explanation, summary, keywords, and classification — all generated in parallel.</p>
    </header>

    <!-- ── Search ──────────────────────────────────────────── -->
    <section class="search-section" aria-label="Search">
      <form id="search-form" class="search-form" role="search">
        <div class="search-input-wrapper">
          <!-- Search icon -->
          <svg class="icon-search" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
          </svg>
          <input
            type="text"
            id="topic-input"
            class="search-input"
            placeholder="e.g. Quantum Computing, CRISPR Gene Editing, Blockchain…"
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" id="btn-search" class="btn-search">
          <span class="spinner" aria-hidden="true"></span>
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m5 12 7-7 7 7"/>
            <path d="M12 19V5"/>
          </svg>
          <span class="btn-label">Research</span>
        </button>
      </form>
    </section>

    <!-- ── Error ───────────────────────────────────────────── -->
    <div id="error-banner" class="error-banner" role="alert">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" x2="12" y1="8" y2="12"/>
        <line x1="12" x2="12.01" y1="16" y2="16"/>
      </svg>
      <p id="error-message">Something went wrong. Please try again.</p>
    </div>

    <!-- ── Results ─────────────────────────────────────────── -->
    <section id="results-section" class="results-section" aria-label="Results">
      <div class="results-header">
        <h2>Results for <span id="results-topic" class="topic-label"></span></h2>
      </div>

      <div class="results-grid">

        <!-- Explanation Card -->
        <article class="card card--explanation" id="card-explanation">
          <div class="card-header">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
              </svg>
            </div>
            <h3 class="card-title">Explanation</h3>
          </div>
          <div class="card-body" id="explanation-content">
            <!-- Skeleton or rendered content -->
          </div>
        </article>

        <!-- Summary Card -->
        <article class="card card--summary" id="card-summary">
          <div class="card-header">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" x2="8" y1="13" y2="13"/>
                <line x1="16" x2="8" y1="17" y2="17"/>
                <line x1="10" x2="8" y1="9" y2="9"/>
              </svg>
            </div>
            <h3 class="card-title">Summary</h3>
          </div>
          <div class="card-body" id="summary-content"></div>
        </article>

        <!-- Keywords Card -->
        <article class="card card--keywords" id="card-keywords">
          <div class="card-header">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2 2 7l10 5 10-5-10-5Z"/>
                <path d="m2 17 10 5 10-5"/>
                <path d="m2 12 10 5 10-5"/>
              </svg>
            </div>
            <h3 class="card-title">Keywords</h3>
          </div>
          <div class="card-body" id="keywords-content"></div>
        </article>

        <!-- Category Card -->
        <article class="card card--category" id="card-category">
          <div class="card-header">
            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
              </svg>
            </div>
            <h3 class="card-title">Category</h3>
          </div>
          <div class="card-body" id="category-content"></div>
        </article>

      </div>
    </section>

    <!-- ── Footer ──────────────────────────────────────────── -->
    <footer class="app-footer">
      <p>Powered by <a href="https://ai.google.dev/" target="_blank" rel="noopener noreferrer">Google Gemini</a> &amp; <a href="https://www.langchain.com/" target="_blank" rel="noopener noreferrer">LangChain</a></p>
    </footer>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
